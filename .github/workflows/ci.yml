name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs: 
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
        
      - name: Install dependencies
        run: npm ci 

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
