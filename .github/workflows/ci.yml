name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: adminuser
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raizes_do_nordeste
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adminuser -d raizes_do_nordeste"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://adminuser:postgres@localhost:5432/raizes_do_nordeste

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: E2E Test
        run: npm run test:e2e
